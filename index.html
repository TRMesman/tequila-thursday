
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tequila Thursday</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fde68a,#bef264);}    
    .container { background:white; border-radius:18px; padding:32px; box-shadow:0 20px 40px rgba(0,0,0,.15); text-align:center; max-width:420px; width:100%; position:relative; overflow:hidden; }
    h1 { margin:0 0 8px; }
    .subtitle { font-size:14px; color:#555; margin-bottom:18px; }
    .gif { width:220px; display:block; margin:0 auto 14px; }
    .timer { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
    .time { background:#f8fafc; border-radius:14px; padding:10px 0; }
    .value { font-size:22px; font-weight:700; }
    .label { font-size:11px; color:#666; text-transform:uppercase; }
    .party { position:absolute; top:0; width:100%; background:black; color:white; font-weight:800; padding:6px 0; display:none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="party" class="party">🎉 PARTY MODE 🎉</div>
    <h1>🌵 Tequila Thursday</h1>
    <div id="subtitle" class="subtitle">Countdown to Thursday 16:30 (NL time)</div>

    <img src="dancing-cactus-sombrero.gif" alt="Dancing cactus wearing a sombrero" class="gif" />

    <div class="timer">
      <div class="time"><div id="d" class="value">0</div><div class="label">Days</div></div>
      <div class="time"><div id="h" class="value">0</div><div class="label">Hours</div></div>
      <div class="time"><div id="m" class="value">0</div><div class="label">Minutes</div></div>
      <div class="time"><div id="s" class="value">0</div><div class="label">Seconds</div></div>
    </div>
  </div>
  <script>
    function amsterdamNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Amsterdam'}));}
    function getWindow(){const n=amsterdamNow(),b=new Date(n),d=(4-b.getDay()+7)%7;const s=new Date(b);s.setDate(b.getDate()+d);s.setHours(16,30,0,0);const e=new Date(s);e.setHours(20,0,0,0);if(n>=e){s.setDate(s.getDate()+7);e.setDate(e.getDate()+7);}return{start:s,end:e};}
    let w=getWindow();
    setInterval(()=>{const n=amsterdamNow();if(n>=w.end)w=getWindow();const p=n>=w.start&&n<w.end;document.getElementById('party').style.display=p?'block':'none';document.getElementById('subtitle').textContent=p?'Party ends at 20:00':'Countdown to Thursday 16:30 (NL time)';const t=p?w.end:w.start;let r=Math.max(0,Math.floor((t-n)/1000));const d=Math.floor(r/86400);r%=86400;const h=Math.floor(r/3600);r%=3600;const m=Math.floor(r/60);const s=r%60;['d','h','m','s'].forEach((id,i)=>{document.getElementById(id).textContent=[d,h,m,s][i];});},1000);
  </script>
</body>
</html>
