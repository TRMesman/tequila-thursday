
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tequila Thursday</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fde68a,#bef264);}    
    .container{background:#fff;border-radius:16px;padding:32px;box-shadow:0 20px 40px rgba(0,0,0,.15);text-align:center;max-width:420px;width:100%;position:relative;overflow:hidden;}
    h1{margin:0 0 8px;} .subtitle{font-size:14px;color:#555;margin-bottom:16px;}
    .gif{width:200px;margin:0 auto 12px;}
    .animation{position:relative;width:160px;height:160px;margin:0 auto 16px;}
    .glass{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:90px;height:110px;border:4px solid #333;border-radius:0 0 18px 18px;overflow:hidden;}
    .tequila{position:absolute;bottom:0;width:100%;height:65%;background:#fbbf24;}
    .lime{position:absolute;top:0;left:50%;width:80px;height:40px;background:#84cc16;border-radius:0 0 80px 80px;transform:translateX(-50%);animation:jump 2.2s ease-in-out infinite;z-index:2;}
    .lime::before,.lime::after{content:'';position:absolute;top:14px;width:6px;height:6px;border-radius:50%;background:black;} .lime::before{left:26px;} .lime::after{right:26px;}
    .drop{position:absolute;bottom:55px;left:50%;width:8px;height:8px;background:#fbbf24;border-radius:50%;opacity:0;animation:splash 2.2s ease-in-out infinite;}
    .d1{margin-left:-16px;} .d2{margin-left:0;animation-delay:.05s;} .d3{margin-left:16px;animation-delay:.1s;}
    @keyframes jump{0%{transform:translate(-50%,0);}45%{transform:translate(-50%,90px);}100%{transform:translate(-50%,0);}}
    @keyframes splash{0%{transform:translate(-50%,0) scale(0);opacity:0;}55%{transform:translate(-50%,-10px) scale(1);opacity:1;}80%{transform:translate(-50%,-22px) scale(.4);opacity:0;}100%{opacity:0;}}
    .timer{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
    .time{background:#f8fafc;border-radius:12px;padding:8px 0;} .value{font-size:20px;font-weight:bold;} .label{font-size:11px;color:#666;text-transform:uppercase;}
    .party{position:absolute;top:0;width:100%;background:black;color:white;font-weight:bold;padding:6px 0;animation:rainbow 2s linear infinite;display:none;}
    @keyframes rainbow{0%{color:#f43f5e;}33%{color:#facc15;}66%{color:#22c55e;}100%{color:#f43f5e;}}
  </style>
</head>
<body>
  <div class="container">
    <div id="party" class="party">🎉 PARTY MODE 🎉</div>
    <h1>🌵 Tequila Thursday</h1>
    <div id="subtitle" class="subtitle">Countdown to Thursday 16:30 (NL)</div>

    <img src="tequila-lime.gif" alt="Lime jumping into tequila" class="gif" />

    <div class="animation">
      <div class="glass"><div class="tequila"></div></div>
      <div class="drop d1"></div><div class="drop d2"></div><div class="drop d3"></div>
      <div class="lime"></div>
    </div>

    <div class="timer">
      <div class="time"><div id="d" class="value">0</div><div class="label">Days</div></div>
      <div class="time"><div id="h" class="value">0</div><div class="label">Hours</div></div>
      <div class="time"><div id="m" class="value">0</div><div class="label">Minutes</div></div>
      <div class="time"><div id="s" class="value">0</div><div class="label">Seconds</div></div>
    </div>
  </div>

<script>
  function amsterdamNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Amsterdam'}));}
  function getWindow(){const now=amsterdamNow();const base=new Date(now);const diff=(4-base.getDay()+7)%7;const start=new Date(base);start.setDate(base.getDate()+diff);start.setHours(16,30,0,0);const end=new Date(start);end.setHours(20,0,0,0);if(now>=end){start.setDate(start.getDate()+7);end.setDate(end.getDate()+7);}return{start,end};}
  let w=getWindow();
  setInterval(()=>{const now=amsterdamNow();if(now>=w.end)w=getWindow();const party=now>=w.start&&now<w.end;document.getElementById('party').style.display=party?'block':'none';document.getElementById('subtitle').textContent=party?'Party ends at 20:00':'Countdown to Thursday 16:30 (NL)';const t=party?w.end:w.start;let diff=Math.max(0,Math.floor((t-now)/1000));const d=Math.floor(diff/86400);diff%=86400;const h=Math.floor(diff/3600);diff%=3600;const m=Math.floor(diff/60);const s=diff%60;['d','h','m','s'].forEach((id,i)=>{document.getElementById(id).textContent=[d,h,m,s][i];});},1000);
</script>
</body>
</html>
